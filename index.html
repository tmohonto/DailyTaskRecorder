<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Daily Task Scheduler</title>
    <!-- Google Font: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="header">
        <h1>🗓️ Daily Task Scheduler</h1>
        <h2 id="date-header"></h2>
        <h2 id="month-year-header" style="font-size:1.2rem;color:#a0a0a0;"></h2>
        <nav class="view-switcher">
            <button data-view="daily" class="active">Daily</button>
            <button data-view="monthly">Monthly</button>
            <button data-view="yearly">Yearly</button>
        </nav>
        <div style="margin-top: 1rem;">
            <button id="export-excel-btn" class="export-btn" style="background: #10b981; color: white; padding: 0.5rem 1rem; border: none; border-radius: 999px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: background 0.3s; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);">📊 Export to Excel</button>
        </div>
    </header>
    <main class="main-content">
        <section class="daily-table-section">
            <table class="daily-table" id="daily-table">
                <thead>
                    <tr>
                        <th>Hour</th>
                        <th>Task</th>
                        <th style="width: 100px;">Work Hours</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows will be generated by app.js -->
                </tbody>
            </table>
        </section>
        <section id="monthly-view" style="display:none;"></section>
        <section id="yearly-view" style="display:none;"></section>
    </main>
    <footer class="footer">
        <p>© 2026 Premium Scheduler – built with love.</p>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="app.js"></script>
</body>

</html>
